{% load static %}

<html>
    <head>
        <title>The List</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link rel="stylesheet" href="{% static '/bootstrap/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static '/bootstrap/css/custom.css' %}">
        <script src="{% static '/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
        
        <style>
            body {
                display: flex;
                flex-direction: column;
                margin: 0; 
                min-height: 100vh;
            }
            .page-wrapper {
                display: flex;
                flex: 1;
            }
            .sidebar {
                width: 250px;
                background-color: #590404;
                padding: 20px;
                box-sizing: border-box;
            }
            .sidebar a {
                display: block;
                color: white;
                text-decoration: none;
                padding: 12px 10px;
                border-radius: 5px;
                margin-bottom: 5px;
            }
            .sidebar a:hover {
                background-color: #480606;
            }
            .main-content {
                flex: 1;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-dark bg-custom sticky-top" style="background-color: #590404;">
            <div class="container-fluid">
                <a class="navbar-brand mb-0" href="{% url 'view_menu' %}">My Tapas Menu</a>
                <a href="{% url 'add_menu' %}" style="color:white"><i class="material-icons">add</i></a>
            </div>
        </nav>

        <div class="page-wrapper">
            <div class="sidebar">
                {% block sidebar %}
                {% endblock %}
            </div>

            <div class="main-content">
                <div class="container">
                    <div class="row">
                        {% block content %}
                        {% endblock %}
                    </div>
                </div>  
            </div>
        </div>
        
        <footer class="footer bg-custom" style="background-color: #590404;">
            <!-- Copyright -->
            <div class="container">&copy; 2020</div>
            <!-- Copyright -->
        </footer>
    </body>
</html>
